#:schema https://json.schemastore.org/any.json

env_files = [".env"]
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd"
bin = "./tmp/main"
entrypoint = ["./tmp/main"]
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["assets", "tmp", "vendor", "frontend/node_modules", "testdata"]
include_dir = []
include_file = []
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
follow_symlink = false
log = "build-errors.log"
poll = false
poll_interval = 500
delay = 500
stop_on_error = true
send_interrupt = false
kill_delay = "500ms"
rerun = false
rerun_delay = 500
args_bin = []
full_bin = ""
pre_cmd = []
post_cmd = []

	[build.windows]
	cmd = "go build -o ./tmp/main.exe ./cmd"
	bin = "tmp\\main.exe"
	entrypoint = ["tmp\\main.exe"]
	full_bin = ""
	pre_cmd = []
	post_cmd = []

[log]
time = false
main_only = false
silent = false

[color]
app = ""
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true